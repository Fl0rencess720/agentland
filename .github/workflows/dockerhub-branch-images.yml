name: build-and-push-branch-images

on:
  push:
    branches-ignore:
      - main

concurrency:
  group: dockerhub-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      DOCKERHUB_NAMESPACE: ${{ secrets.DOCKERHUB_NAMESPACE || secrets.DOCKERHUB_USERNAME }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: korokd
            image: agentland-korokd
            dockerfile: docker/Dockerfile.korokd
          - name: gateway
            image: agentland-gateway
            dockerfile: docker/Dockerfile.gateway
          - name: agentcore
            image: agentland-agentcore
            dockerfile: docker/Dockerfile.agentcore

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ env.DOCKERHUB_NAMESPACE }}/${{ matrix.image }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
